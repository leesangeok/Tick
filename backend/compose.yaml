services:
  postgres:
    image: postgres:16-alpine
    container_name: tick-postgres
    environment:
      POSTGRES_DB: tick
      POSTGRES_USER: tick
      POSTGRES_PASSWORD: tick
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - tick_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tick -d tick"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tick_pgdata:
