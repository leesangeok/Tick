spring:
  application:
    name: tick
  profiles:
    active: local
  datasource:
    url: jdbc:postgresql://localhost:5432/tick
    username: tick
    password: tick
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: Asia/Seoul
  flyway:
    enabled: true
    baseline-on-migrate: true
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-name: Kakao
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - account_email
            client-authentication-method: client_secret_post
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  port: 8080
  # Caddy (reverse proxy) 가 TLS 종료 후 X-Forwarded-* 헤더로 원본 스킴/host 전달.
  # 이게 없으면 Spring 이 자기 자신을 http://...:8080 로 인식해서
  # OAuth redirect_uri 가 http:// 로 나감 → 카카오 KOE006.
  forward-headers-strategy: native

management:
  endpoints:
    web:
      exposure:
        include: health,info

tick:
  naver:
    news:
      client-id: ${NAVER_CLIENT_ID:}
      client-secret: ${NAVER_CLIENT_SECRET:}
  cors:
    allowed-origins: http://localhost:3000
  jwt:
    # secret/ttl 은 application-local.yml 에서 주입
    secret: ${TICK_JWT_SECRET:}
    access-ttl-min: ${TICK_JWT_ACCESS_TTL_MIN:60}
    refresh-ttl-days: ${TICK_JWT_REFRESH_TTL_DAYS:14}
  auth:
    frontend-callback-url: ${TICK_FRONTEND_CALLBACK_URL:http://localhost:3000/auth/callback}
    frontend-login-url: ${TICK_FRONTEND_LOGIN_URL:http://localhost:3000/login}
    cookie-same-site: ${TICK_AUTH_COOKIE_SAME_SITE:Lax}
    cookie-secure: ${TICK_AUTH_COOKIE_SECURE:false}
    cookie-domain: ${TICK_AUTH_COOKIE_DOMAIN:}
