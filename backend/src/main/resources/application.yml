spring:
  application:
    name: tick
  profiles:
    active: local
  datasource:
    url: jdbc:postgresql://localhost:5432/tick
    username: tick
    password: tick
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: Asia/Seoul
  flyway:
    enabled: true
    baseline-on-migrate: true
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-name: Kakao
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - account_email
            client-authentication-method: client_secret_post
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  port: 8080
  # Caddy (reverse proxy) 가 TLS 종료 후 X-Forwarded-* 헤더로 원본 스킴/host 전달.
  # 이게 없으면 Spring 이 자기 자신을 http://...:8080 로 인식해서
  # OAuth redirect_uri 가 http:// 로 나감 → 카카오 KOE006.
  forward-headers-strategy: native

management:
  endpoints:
    web:
      exposure:
        include: health,info

tick:
  ai-server:
    url: ${TICK_AI_SERVER_URL:http://ai-server:8000}
    timeout-sec: 30
  naver:
    news:
      client-id: ${NAVER_CLIENT_ID:}
      client-secret: ${NAVER_CLIENT_SECRET:}
  dart:
    # opendart.fss.or.kr 공시 어댑터. disabled 또는 api-key blank 면 no-op (다른 collector 는 정상).
    enabled: ${TICK_DART_ENABLED:false}
    api-key: ${DART_API_KEY:}
    base-url: ${DART_BASE_URL:https://opendart.fss.or.kr/api}
    lookback-days: ${TICK_DART_LOOKBACK_DAYS:30}
    page-count: ${TICK_DART_PAGE_COUNT:100}
    # A 정기공시 / B 주요사항 / C 발행공시. D(지분) / E(기타) 는 노이즈 커서 제외.
    include-types: A,B,C
  cors:
    allowed-origins: http://localhost:3000
  jwt:
    # secret/ttl 은 application-local.yml 에서 주입
    secret: ${TICK_JWT_SECRET:}
    access-ttl-min: ${TICK_JWT_ACCESS_TTL_MIN:60}
    refresh-ttl-days: ${TICK_JWT_REFRESH_TTL_DAYS:14}
  auth:
    frontend-callback-url: ${TICK_FRONTEND_CALLBACK_URL:http://localhost:3000/auth/callback}
    frontend-login-url: ${TICK_FRONTEND_LOGIN_URL:http://localhost:3000/login}
    cookie-same-site: ${TICK_AUTH_COOKIE_SAME_SITE:Lax}
    cookie-secure: ${TICK_AUTH_COOKIE_SECURE:false}
    cookie-domain: ${TICK_AUTH_COOKIE_DOMAIN:}
    # dev/internal 용 토큰 발급 endpoint 활성화 토글. prod 에선 절대 true 금지.
    dev-token-enabled: ${TICK_AUTH_DEV_TOKEN_ENABLED:false}
  stock-quote:
    # yahoo 또는 mulberry. 기본 yahoo (실시간 15분 지연 데이터).
    # 외부 API 불가한 환경 (오프라인 테스트) 에선 mulberry 로 전환.
    provider: ${TICK_STOCK_QUOTE_PROVIDER:yahoo}
    yahoo:
      base-url: ${YAHOO_FINANCE_BASE_URL:https://query1.finance.yahoo.com}
      quote-ttl-sec: ${YAHOO_QUOTE_TTL_SEC:30}
      series-ttl-sec: ${YAHOO_SERIES_TTL_SEC:3600}

spring.data.redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  # password 가 비어있으면 인증 안 함. prod 환경은 SSM 으로 주입.
  password: ${REDIS_PASSWORD:}
  timeout: 2000ms
