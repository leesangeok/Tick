name: CI

# Frontend 빌드/린트는 Vercel preview 가 담당하므로 여기엔 backend / infra 만.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            infra:
              - 'infrastructure-as-code/**'

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tick
          POSTGRES_USER: tick
          POSTGRES_PASSWORD: tick
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tick -d tick"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew build --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: ci
          TICK_JWT_SECRET: ci_only_jwt_secret_not_used_in_production_min_32_bytes
          SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_ID: ci_dummy
          SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_SECRET: ci_dummy
      - name: Build docker image
        run: docker build -t tick-backend:ci .

  infra:
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.10.0'
      - name: Terraform fmt check
        run: terraform fmt -check -recursive infrastructure-as-code
      - name: Terraform validate (bootstrap)
        working-directory: infrastructure-as-code/bootstrap
        run: |
          terraform init -backend=false
          terraform validate
      - name: Terraform validate (envs/dev)
        working-directory: infrastructure-as-code/terraform/envs/dev
        run: |
          terraform init -backend=false
          terraform validate
