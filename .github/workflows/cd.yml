name: CD

# Frontend 는 Vercel 이 자동 배포함. 이 워크플로우는 backend 만 담당.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  PROJECT: tick
  ENVIRONMENT: dev

jobs:
  push-backend:
    runs-on: ubuntu-latest
    outputs:
      pushed: ${{ steps.build.outputs.pushed }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build and push backend (arm64 for t4g EC2)
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ env.PROJECT }}-${{ env.ENVIRONMENT }}-backend
          TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t $REGISTRY/$REPOSITORY:$TAG \
            -t $REGISTRY/$REPOSITORY:latest \
            --push \
            backend
          echo "pushed=true" >> "$GITHUB_OUTPUT"

  deploy:
    needs: push-backend
    if: needs.push-backend.outputs.pushed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: SSM deploy
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          set -e
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com

          PARAMS=$(jq -n --arg region "$AWS_REGION" --arg registry "$REGISTRY" '{
            commands: [
              "set -e",
              "cd /opt/tick",
              "aws ecr get-login-password --region \($region) | docker login --username AWS --password-stdin \($registry)",
              "docker compose -f compose.prod.yaml --env-file .env pull",
              "docker compose -f compose.prod.yaml --env-file .env up -d --remove-orphans",
              "docker image prune -af --filter until=72h"
            ]
          }')

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "deploy ${GITHUB_SHA::7}" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" --output text)
          echo "Command ID: $CMD_ID"

          for i in {1..60}; do
            sleep 5
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query Status --output text 2>/dev/null || echo "Pending")
            echo "[$i] $STATUS"
            case "$STATUS" in
              Success) exit 0 ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "[StandardOutputContent,StandardErrorContent]" --output text
                exit 1 ;;
            esac
          done
          echo "timeout waiting for SSM command"
          exit 1
