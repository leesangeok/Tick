name: CD

# Frontend 는 Vercel 이 자동 배포. 이 워크플로우는 backend + ai-server.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'ai-server/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  PROJECT: tick
  ENVIRONMENT: dev

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ai_server: ${{ steps.filter.outputs.ai_server }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            ai_server:
              - 'ai-server/**'

  push-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build and push backend (arm64 for t4g EC2)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ env.PROJECT }}-${{ env.ENVIRONMENT }}-backend
          TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t $REGISTRY/$REPOSITORY:$TAG \
            -t $REGISTRY/$REPOSITORY:latest \
            --push \
            backend

  push-ai-server:
    needs: changes
    if: needs.changes.outputs.ai_server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build and push ai-server (arm64 for t4g EC2)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ env.PROJECT }}-${{ env.ENVIRONMENT }}-ai-server
          TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t $REGISTRY/$REPOSITORY:$TAG \
            -t $REGISTRY/$REPOSITORY:latest \
            --push \
            ai-server

  deploy:
    needs: [changes, push-backend, push-ai-server]
    # 둘 중 하나라도 push 됐으면 deploy. always() 로 skipped job 도 통과.
    if: |
      always() &&
      (needs.push-backend.result == 'success' || needs.push-ai-server.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: SSM deploy (rolling backend + ai-server)
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          BACKEND_CHANGED: ${{ needs.changes.outputs.backend }}
          AI_SERVER_CHANGED: ${{ needs.changes.outputs.ai_server }}
        run: |
          set -e
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com

          # Rolling deploy:
          # 1) 변경된 서비스 이미지 pull
          # 2) backend 변경 → backend-a → backend-b 순서 force-recreate (무중단)
          # 3) ai-server 변경 → force-recreate (내부 호출만 받으니 짧은 다운타임 OK)
          read -r -d '' ROLLING_SCRIPT <<'BASH' || true
          set -e
          cd /opt/tick

          # Redis 서비스 + REDIS_HOST 환경변수를 compose.prod.yaml 에 override 로 주입.
          # user_data.sh 가 처음 부팅 때만 실행되므로 추후 user_data 변경분이 반영 안 됨
          # → 매 deploy 시 override 를 직접 작성해서 보장 (idempotent).
          cat > compose.override.yaml <<'YAML'
          services:
            redis:
              image: redis:7-alpine
              container_name: tick-redis
              restart: unless-stopped
              healthcheck:
                test: ["CMD", "redis-cli", "ping"]
                interval: 10s
                timeout: 3s
                retries: 10
            backend-a:
              environment:
                REDIS_HOST: redis
                REDIS_PORT: "6379"
              depends_on:
                redis:
                  condition: service_healthy
            backend-b:
              environment:
                REDIS_HOST: redis
                REDIS_PORT: "6379"
              depends_on:
                redis:
                  condition: service_healthy
            ai-server:
              environment:
                REDIS_HOST: redis
                REDIS_PORT: "6379"
              depends_on:
                redis:
                  condition: service_healthy
          YAML

          # redis 자체는 한 번만 띄움 (이미 떠있으면 noop).
          docker compose -f compose.prod.yaml -f compose.override.yaml --env-file .env up -d redis

          aws ecr get-login-password --region REGION_PLACEHOLDER \
            | docker login --username AWS --password-stdin REGISTRY_PLACEHOLDER

          docker compose -f compose.prod.yaml -f compose.override.yaml --env-file .env pull

          if [ "${BACKEND_CHANGED}" = "true" ]; then
            for svc in backend-a backend-b; do
              echo "::group::rolling $svc"
              docker compose -f compose.prod.yaml -f compose.override.yaml --env-file .env up -d \
                --no-deps --force-recreate "$svc"

              status="starting"
              for i in $(seq 1 40); do
                sleep 3
                status=$(docker inspect \
                  --format '{{.State.Health.Status}}' "tick-$svc" 2>/dev/null \
                  || echo missing)
                echo "[$i] $svc=$status"
                [ "$status" = "healthy" ] && break
              done

              if [ "$status" != "healthy" ]; then
                echo "::error::$svc did not become healthy"
                docker logs --tail=120 "tick-$svc" || true
                exit 1
              fi
              echo "::endgroup::"
            done
          fi

          if [ "${AI_SERVER_CHANGED}" = "true" ]; then
            echo "::group::ai-server"
            docker compose -f compose.prod.yaml -f compose.override.yaml --env-file .env up -d \
              --no-deps --force-recreate ai-server

            status="starting"
            for i in $(seq 1 30); do
              sleep 2
              status=$(docker inspect \
                --format '{{.State.Health.Status}}' tick-ai-server 2>/dev/null \
                || echo missing)
              echo "[$i] ai-server=$status"
              [ "$status" = "healthy" ] && break
            done

            if [ "$status" != "healthy" ]; then
              echo "::error::ai-server did not become healthy"
              docker logs --tail=120 tick-ai-server || true
              exit 1
            fi
            echo "::endgroup::"
          fi

          docker compose -f compose.prod.yaml -f compose.override.yaml --env-file .env up -d \
            --no-deps caddy || true
          docker image prune -af --filter until=72h
          BASH

          ROLLING_SCRIPT=${ROLLING_SCRIPT//REGION_PLACEHOLDER/$AWS_REGION}
          ROLLING_SCRIPT=${ROLLING_SCRIPT//REGISTRY_PLACEHOLDER/$REGISTRY}
          ROLLING_SCRIPT=${ROLLING_SCRIPT//\$\{BACKEND_CHANGED\}/$BACKEND_CHANGED}
          ROLLING_SCRIPT=${ROLLING_SCRIPT//\$\{AI_SERVER_CHANGED\}/$AI_SERVER_CHANGED}

          PARAMS=$(jq -n --arg script "$ROLLING_SCRIPT" '{
            commands: [$script]
          }')

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "deploy ${GITHUB_SHA::7}" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" --output text)
          echo "Command ID: $CMD_ID"

          for i in {1..120}; do
            sleep 5
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query Status --output text 2>/dev/null || echo "Pending")
            echo "[$i] $STATUS"
            case "$STATUS" in
              Success) exit 0 ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "[StandardOutputContent,StandardErrorContent]" --output text
                exit 1 ;;
            esac
          done
          echo "timeout waiting for SSM command"
          exit 1
