name: CD

# Frontend 는 Vercel 이 자동 배포함. 이 워크플로우는 backend 만 담당.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  PROJECT: tick
  ENVIRONMENT: dev

jobs:
  push-backend:
    runs-on: ubuntu-latest
    outputs:
      pushed: ${{ steps.build.outputs.pushed }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build and push backend (arm64 for t4g EC2)
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ env.PROJECT }}-${{ env.ENVIRONMENT }}-backend
          TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t $REGISTRY/$REPOSITORY:$TAG \
            -t $REGISTRY/$REPOSITORY:latest \
            --push \
            backend
          echo "pushed=true" >> "$GITHUB_OUTPUT"

  deploy:
    needs: push-backend
    if: needs.push-backend.outputs.pushed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: SSM deploy (rolling backend-a → backend-b, zero-downtime)
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          set -e
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com

          # Rolling deploy:
          # 1) 새 이미지 pull
          # 2) backend-a force-recreate → healthy 대기 (최대 ~2분)
          # 3) backend-b force-recreate → healthy 대기
          # 4) caddy/frontend 는 변경 없으면 그대로, postgres 도 건드리지 않음
          # 각 단계마다 Caddy 의 upstream pool 중 다른 한 쪽이 트래픽 받음.
          read -r -d '' ROLLING_SCRIPT <<'BASH' || true
          set -e
          cd /opt/tick

          aws ecr get-login-password --region REGION_PLACEHOLDER \
            | docker login --username AWS --password-stdin REGISTRY_PLACEHOLDER

          docker compose -f compose.prod.yaml --env-file .env pull

          for svc in backend-a backend-b; do
            echo "::group::rolling $svc"
            docker compose -f compose.prod.yaml --env-file .env up -d \
              --no-deps --force-recreate "$svc"

            status="starting"
            for i in $(seq 1 40); do
              sleep 3
              status=$(docker inspect \
                --format '{{.State.Health.Status}}' "tick-$svc" 2>/dev/null \
                || echo missing)
              echo "[$i] $svc=$status"
              [ "$status" = "healthy" ] && break
            done

            if [ "$status" != "healthy" ]; then
              echo "::error::$svc did not become healthy"
              docker logs --tail=120 "tick-$svc" || true
              exit 1
            fi
            echo "::endgroup::"
          done

          docker compose -f compose.prod.yaml --env-file .env up -d \
            --no-deps frontend caddy || true
          docker image prune -af --filter until=72h
          BASH

          ROLLING_SCRIPT=${ROLLING_SCRIPT//REGION_PLACEHOLDER/$AWS_REGION}
          ROLLING_SCRIPT=${ROLLING_SCRIPT//REGISTRY_PLACEHOLDER/$REGISTRY}

          PARAMS=$(jq -n --arg script "$ROLLING_SCRIPT" '{
            commands: [$script]
          }')

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "deploy ${GITHUB_SHA::7}" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" --output text)
          echo "Command ID: $CMD_ID"

          for i in {1..120}; do
            sleep 5
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query Status --output text 2>/dev/null || echo "Pending")
            echo "[$i] $STATUS"
            case "$STATUS" in
              Success) exit 0 ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "[StandardOutputContent,StandardErrorContent]" --output text
                exit 1 ;;
            esac
          done
          echo "timeout waiting for SSM command"
          exit 1
