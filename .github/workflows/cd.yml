name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write # OIDC
  contents: read

env:
  AWS_REGION: ap-northeast-2
  PROJECT: tick
  ENVIRONMENT: dev

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  push-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build and push backend
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ env.PROJECT }}-${{ env.ENVIRONMENT }}-backend
          TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$TAG -t $REGISTRY/$REPOSITORY:latest backend
          docker push $REGISTRY/$REPOSITORY:$TAG
          docker push $REGISTRY/$REPOSITORY:latest

  push-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build and push frontend
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ env.PROJECT }}-${{ env.ENVIRONMENT }}-frontend
          TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$TAG -t $REGISTRY/$REPOSITORY:latest frontend
          docker push $REGISTRY/$REPOSITORY:$TAG
          docker push $REGISTRY/$REPOSITORY:latest

  deploy:
    needs: [push-backend, push-frontend]
    if: |
      always() &&
      !cancelled() &&
      (needs.push-backend.result == 'success' || needs.push-frontend.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: SSM deploy
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
          CMD_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name AWS-RunShellScript \
            --comment "deploy ${GITHUB_SHA::7}" \
            --parameters "commands=[
              'set -e',
              'cd /opt/tick',
              'aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin '${REGISTRY}'',
              'docker compose -f compose.prod.yaml --env-file .env pull',
              'docker compose -f compose.prod.yaml --env-file .env up -d --remove-orphans',
              'docker image prune -af --filter until=72h'
            ]" \
            --query "Command.CommandId" --output text)
          echo "Command ID: $CMD_ID"
          for i in {1..60}; do
            sleep 5
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
              --query Status --output text 2>/dev/null || echo "Pending")
            echo "[$i] $STATUS"
            case "$STATUS" in
              Success) exit 0 ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" \
                  --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
                  --query "[StandardOutputContent,StandardErrorContent]" --output text
                exit 1 ;;
            esac
          done
          echo "timeout waiting for SSM command"
          exit 1
